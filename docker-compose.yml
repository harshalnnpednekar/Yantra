version: '3.8'

services:
  # Database for the Backend module
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: yantra_user
      POSTGRES_PASSWORD: yantra_pass
      POSTGRES_DB: yantra_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Redis for Caching or WebSockets
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
